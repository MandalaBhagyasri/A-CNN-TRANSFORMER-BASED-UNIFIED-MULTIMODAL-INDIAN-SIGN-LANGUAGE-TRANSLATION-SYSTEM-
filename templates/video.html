{% extends "index.html" %}
{% block title %}Video Input{% endblock %}
{% block input_section %}
<div class="input-card glass-card float-card">
    <h3><i class="fas fa-video"></i> <span data-i18n="nav_video">Sign Language Video</span></h3>
    <div class="custom-file-input" style="margin-bottom: 16px;">
        <input type="file" id="video-file" accept="video/*" style="display: none;">
        <button type="button" class="file-button" onclick="document.getElementById('video-file').click();">
            <i class="fas fa-folder-open"></i> <span data-i18n="file_choose">Choose File</span>
        </button>
        <span id="video-file-name" class="file-name" data-i18n="file_not_chosen">No file chosen</span>
    </div>
    <button onclick="predictVideo(event)"><i class="fas fa-play"></i> <span data-i18n="video_button">Translate from
            Video</span></button>
    <p class="info-text"><i class="fas fa-info-circle"></i> <span data-i18n="video_info">Upload a recorded sign
            video</span></p>
</div>

<script>
    document.getElementById('video-file').addEventListener('change', function (e) {
        const fileName = e.target.files[0] ? e.target.files[0].name : '';
        const fileNameSpan = document.getElementById('video-file-name');
        if (fileName) {
            fileNameSpan.innerText = fileName;
        } else {
            const lang = window.currentUILang || 'en';
            fileNameSpan.innerText = uiTranslations[lang]?.file_not_chosen || 'No file chosen';
        }
    });
</script>
{% endblock %}
