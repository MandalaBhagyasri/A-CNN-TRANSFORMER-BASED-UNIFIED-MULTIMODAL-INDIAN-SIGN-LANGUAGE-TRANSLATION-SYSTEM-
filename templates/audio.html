{% extends "index.html" %}
{% block title %}Audio Input{% endblock %}
{% block input_section %}
<div class="input-card glass-card float-card">
    <h3><i class="fas fa-file-audio"></i> <span data-i18n="nav_audio">Audio File Upload</span></h3>
    <label for="audio-file" style="display: block; margin-bottom: 5px; font-weight: 500;" data-i18n="audio_label">Upload
        Audio File:</label>
    <div class="custom-file-input" style="margin-bottom: 16px;">
        <input type="file" id="audio-file" accept="audio/*" style="display: none;">
        <button type="button" class="file-button" onclick="document.getElementById('audio-file').click();">
            <i class="fas fa-folder-open"></i> <span data-i18n="file_choose">Choose File</span>
        </button>
        <span id="audio-file-name" class="file-name" data-i18n="file_not_chosen">No file chosen</span>
    </div>
    <button onclick="predictAudio(event)" style="margin-top: 10px;"><i class="fas fa-upload"></i> <span
            data-i18n="audio_button">Translate from Audio File</span></button>
</div>

<script>
    document.getElementById('audio-file').addEventListener('change', function (e) {
        const fileName = e.target.files[0] ? e.target.files[0].name : '';
        const fileNameSpan = document.getElementById('audio-file-name');
        if (fileName) {
            fileNameSpan.innerText = fileName;
        } else {
            const lang = window.currentUILang || 'en';
            fileNameSpan.innerText = uiTranslations[lang]?.file_not_chosen || 'No file chosen';
        }
    });
</script>
{% endblock %}
